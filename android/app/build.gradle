plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

def facebookProperties = new Properties()
def facebookPropertiesFile = rootProject.file("facebook.properties")
if (facebookPropertiesFile.exists()) {
    facebookPropertiesFile.withInputStream { stream ->
        facebookProperties.load(stream)
    }
}

def readFacebookSecret = { String key ->
    return (facebookProperties.getProperty(key) ?: System.getenv(key) ?: "").trim()
}

def facebookAppId = readFacebookSecret("FACEBOOK_APP_ID")
def facebookClientToken = readFacebookSecret("FACEBOOK_CLIENT_TOKEN")
def facebookLoginScheme = readFacebookSecret("FACEBOOK_LOGIN_SCHEME")
if (!facebookLoginScheme) {
    facebookLoginScheme = facebookAppId ? "fb${facebookAppId}" : "fb000000000000000"
}

android {
    namespace = "com.example.chatting_app"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.example.jobseeker"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        resValue "string", "facebook_app_id", facebookAppId ?: "000000000000000"
        resValue "string", "facebook_client_token", facebookClientToken
        resValue "string", "fb_login_protocol_scheme", facebookLoginScheme
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
